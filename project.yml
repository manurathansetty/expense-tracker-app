name: Pi
options:
  bundleIdPrefix: ai.pageloop
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Pi:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: Pi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.pageloop.pi
        PRODUCT_NAME: Pi
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Pi/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: PiWidgets
      - target: PiShareExtension

  PiWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: PiWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.pageloop.pi.widgets
        PRODUCT_NAME: PiWidgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PiWidgets/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PiShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: PiShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.pageloop.pi.share
        PRODUCT_NAME: PiShareExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PiShareExtension/Info.plist

  PiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PiTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.pageloop.pi.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pi
